<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Uruena Tincani - Profesional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.11.0/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; text-align: center; }
        header { background-color: #1a1a2e; color: white; padding: 40px 20px; }
        section { padding: 30px; margin: 20px auto; max-width: 800px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #contacto { background-color: #4a5c6a; color: white; border-radius: 12px; }
        form { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        input, textarea { width: 90%; padding: 12px; border-radius: 6px; border: none; font-size: 16px; }
        button { width: 50%; padding: 15px; background-color: #1a1a2e; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #888; }
        #status { padding: 15px; border-radius: 6px; display: none; margin-top: 10px; font-weight: bold; width: 90%; }
        img#cvimg { width: 100%; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<header>
    <h1>Pablo Uruena Tincani</h1>
    <p>Ingeniero / Analista en Sistemas de Información</p>
</header>

<section id="cv">
    <h2>Mi Currículum Vitae</h2>
    <img id="cvimg" src="img/Pablo Alejandro Urueña Tincani 2025.png" alt="CV Pablo Uruena">
</section>

<section id="contacto">
    <h2>Contáctame y Adjunta tu PDF</h2>
    <form id="formIndex">
        <input type="email" id="email" placeholder="Tu Email" required>
        <input type="text" id="asunto" placeholder="Asunto" required>
        <textarea id="mensaje" rows="4" placeholder="Mensaje..." required></textarea>
        <label style="font-weight: bold;">Adjuntar archivo PDF:</label>
        <input type="file" id="archivo" accept=".pdf" required style="background: white; color: black;">
        <button type="submit" id="btnEnviar">Enviar</button>
        <div id="status"></div>
    </form>
</section>

<script>
    // ===== DATOS CORREGIDOS =====
    const CLIENT_ID = '1wpdtwlh7fg0lxb';
    const CLIENT_SECRET = 'ktf6yj0krxhelbm';
    
    // ¡ESTE ES EL REFRESH TOKEN NUEVO y VÁLIDO!
    const REFRESH_TOKEN = '9FeMnE_WNlMAAAAAAAAAAXHOIMZHTwKem0wOsQNkYVNq0jtTxuxfCWJ-kHvr_60s';
    // ============================

    async function obtenerToken() {
        try {
            const resp = await fetch('https://api.dropbox.com/oauth2/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    'grant_type': 'refresh_token',
                    'refresh_token': REFRESH_TOKEN,
                    'client_id': CLIENT_ID,
                    'client_secret': CLIENT_SECRET
                })
            });
            
            const data = await resp.json();
            
            if (!resp.ok) {
                console.error('Error de Destino:', data);
                throw new Error(data.error_description || 'Error al conectar con Destino');
            }
            
            return data.access_token;
        } catch (error) {
            console.error('Error en obtenerToken:', error);
            throw error;
        }
    }

    document.getElementById('formIndex').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.style.display = "block";
        status.style.backgroundColor = "#fff3cd";
        status.style.color = "#856404";
        status.innerText = "⏳ Conectando con Destino...";

        try {
            // Validar que haya un archivo
            const file = document.getElementById('archivo').files[0];
            if (!file) {
                throw new Error('Por favor selecciona un archivo PDF');
            }
            
            if (file.type !== 'application/pdf') {
                throw new Error('Solo se permiten archivos PDF');
            }

            // Obtener token de acceso
            status.innerText = "⏳ Obteniendo acceso...";
            const accessToken = await obtenerToken();
            
            // Inicializar Dropbox
            const dbx = new Dropbox.Dropbox({ accessToken });
            
            // Preparar datos
            const email = document.getElementById('email').value;
            const cleanId = email.replace(/[^a-z0-9]/gi, '_');
            
            const infoTxt = `Email: ${email}
Asunto: ${document.getElementById('asunto').value}
Mensaje: ${document.getElementById('mensaje').value}
Fecha: ${new Date().toLocaleString()}`;

            // Subir archivos
            status.innerText = "⏳ Subiendo archivos ...";
            
            // Subir archivo de texto
            await dbx.filesUpload({
                path: `/${cleanId}_datos.txt`,
                contents: infoTxt,
                mode: 'overwrite'
            });
            
            // Subir PDF
            await dbx.filesUpload({
                path: `/${cleanId}_${file.name}`,
                contents: file,
                mode: 'overwrite'
            });

            status.innerText = "✅ ¡Archivos enviados con éxito!";
            status.style.backgroundColor = "#d4edda";
            status.style.color = "#155724";
            this.reset();
            
        } catch (err) {
            console.error('Error completo:', err);
            
            let mensajeError = err.message;
            if (err.error && err.error.error_summary) {
                mensajeError = err.error.error_summary;
            }
            
            status.innerText = "❌ Error: " + mensajeError;
            status.style.backgroundColor = "#f8d7da";
            status.style.color = "#721c24";
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
