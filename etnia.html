<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Estimación Étnica</title>
    <script src="https://d3js.org/d3.v7.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            background: #16213e;
            border-radius: 32px;
            padding: 30px 30px 40px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 18px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        header h1 {
            color: #f0e6d0;
            font-weight: 400;
            font-size: 2.1rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            font-family: 'Georgia', serif;
        }
        header .page {
            color: #a0aec0;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .rotacion-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.12);
            color: #ffd966;
            padding: 2px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-left: 12px;
            border: 1px solid rgba(255, 215, 0, 0.15);
        }
        .map-wrapper {
            position: relative;
            width: 100%;
            background: #0f1a2f;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            padding: 10px 0;
        }
        #map-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #map-container svg {
            display: block;
            width: 100%;
            height: auto;
            background: #0f1a2f;
            border-radius: 16px;
        }

        /* Estilos de países (fondo) */
        .country {
            stroke: #1a2a44;
            stroke-width: 0.5;
            fill: #2a3a5a;
            transition: none;
            vector-effect: non-scaling-stroke;
        }

        /* Regiones polimórficas */
        .region-shape {
            fill-opacity: 0.25;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 1.5;
            transition: fill-opacity 0.25s ease, stroke 0.25s ease, stroke-width 0.25s ease, filter 0.25s ease;
            cursor: pointer;
            vector-effect: non-scaling-stroke;
        }
        .region-shape.active {
            fill-opacity: 0.65;
            stroke: #ffd966;
            stroke-width: 3;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
        }

        #tooltip {
            position: absolute;
            background: rgba(10, 14, 30, 0.92);
            backdrop-filter: blur(8px);
            color: #f0e6d0;
            padding: 14px 22px;
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            pointer-events: none;
            font-size: 1.1rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: opacity 0.25s ease;
            font-weight: 400;
            letter-spacing: 0.3px;
            max-width: 240px;
            line-height: 1.5;
            z-index: 10;
        }
        #tooltip .region {
            font-weight: 600;
            font-size: 1.3rem;
            color: #ffd966;
        }
        #tooltip .percent {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-left: 8px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px 30px;
            margin-top: 28px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d0d8e0;
            font-size: 1rem;
            font-weight: 400;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            transition: background 0.2s ease, transform 0.2s ease;
            border: 1px solid transparent;
        }
        .legend-item:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            transform: scale(1.03);
        }
        .legend-color {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }
        .legend-label {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .legend-label .pct {
            font-weight: 600;
            color: #fff;
            font-size: 1.1rem;
        }

        @media (max-width: 700px) {
            .container {
                padding: 16px;
            }
            header h1 {
                font-size: 1.6rem;
            }
            .legend {
                gap: 10px 18px;
                padding: 12px 16px;
            }
            .legend-item {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                Descubra la mezcla que lo hace único
                <span class="rotacion-badge">↻ rotado 90°</span>
            </h1>
            <span class="page">Página 2</span>
        </header>

        <div class="map-wrapper">
            <div id="map-container"></div>
            <div id="tooltip">
                <div class="region">—</div>
                <div><span class="percent">0%</span> de tu origen</div>
            </div>
        </div>

        <!-- Leyenda interactiva -->
        <div class="legend" id="legend"></div>
    </div>

    <script>
        (function() {
            // ---------- DATOS DE REGIONES ----------
            const regionData = [{
                id: 'africa',
                label: 'África',
                pct: 20,
                color: '#E6A84A',
                center: [20, 5], // [lon, lat]
                radius: 18 // grados
            }, {
                id: 'asia',
                label: 'Asia',
                pct: 15,
                color: '#E54A4A',
                center: [100, 40],
                radius: 25
            }, {
                id: 'europe',
                label: 'Europa',
                pct: 45,
                color: '#4A8FE4',
                center: [15, 50],
                radius: 15
            }, {
                id: 'north_america',
                label: 'América del Norte',
                pct: 5,
                color: '#6BBF6B',
                center: [-100, 45],
                radius: 16
            }, {
                id: 'south_america',
                label: 'América del Sur',
                pct: 10,
                color: '#B37BCC',
                center: [-60, -15],
                radius: 15
            }, {
                id: 'oceania',
                label: 'Oceanía',
                pct: 5,
                color: '#F2C94D',
                center: [135, -25],
                radius: 12
            }];

            // ---------- DIMENSIONES Y CONTENEDOR ----------
            const width = 1000,
                height = 600;
            const container = document.getElementById('map-container');
            const svg = d3.select('#map-container')
                .append('svg')
                .attr('viewBox', `0 0 ${width} ${height}`)
                .style('width', '100%')
                .style('height', 'auto');

            const tooltip = d3.select('#tooltip');

            // ---------- PROYECCIÓN (se ajustará con fitExtent) ----------
            let projection, path;

            // ---------- CARGA DE MAPA ----------
            const url = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json';

            d3.json(url).then(data => {
                const countries = topojson.feature(data, data.objects.countries);

                // Proyección ajustada al tamaño del contenedor
                projection = d3.geoMercator()
                    .fitExtent([
                        [20, 20],
                        [width - 20, height - 20]
                    ], countries);
                path = d3.geoPath().projection(projection);

                // ----- 1. Dibujar países (fondo) -----
                svg.selectAll('.country')
                    .data(countries.features)
                    .enter()
                    .append('path')
                    .attr('class', 'country')
                    .attr('d', path)
                    .attr('fill', '#2a3a5a') // color uniforme
                    .attr('stroke', '#1a2a44')
                    .attr('stroke-width', 0.5);

                // ----- 2. Generar regiones polimórficas (círculos geográficos) -----
                // Creamos un grupo para cada región
                const regionGroup = svg.selectAll('.region-group')
                    .data(regionData)
                    .enter()
                    .append('g')
                    .attr('class', 'region-group');

                // Generar el círculo geográfico (GeoJSON) para cada región
                regionGroup.each(function(d) {
                    const group = d3.select(this);
                    const circleGen = d3.geoCircle()
                        .center(d.center)
                        .radius(d.radius);
                    const circleFeature = circleGen(); // GeoJSON Polygon

                    group.append('path')
                        .attr('class', 'region-shape')
                        .attr('d', path(circleFeature))
                        .attr('fill', d.color)
                        .attr('stroke', d.color)
                        .attr('stroke-width', 1.5)
                        .attr('data-region-id', d.id)
                        .on('mouseover', function(event) {
                            highlightRegion(d.id);
                            showTooltip(event, d.label, d.pct);
                        })
                        .on('mousemove', function(event) {
                            moveTooltip(event);
                        })
                        .on('mouseout', function() {
                            unhighlightRegion(d.id);
                            hideTooltip();
                        });
                });

                // ----- 3. Leyenda interactiva -----
                const legendDiv = document.getElementById('legend');
                legendDiv.innerHTML = '';
                regionData.forEach(r => {
                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    item.dataset.regionId = r.id;
                    item.innerHTML = `
                        <span class="legend-color" style="background:${r.color};"></span>
                        <span class="legend-label">
                            ${r.label}
                            <span class="pct">${r.pct}%</span>
                        </span>
                    `;
                    item.addEventListener('mouseover', () => {
                        highlightRegion(r.id);
                        // También mostrar tooltip cerca del cursor? Mejor lo dejamos fijo en la leyenda o no tooltip.
                        // Pero podemos mostrar un tooltip en el mapa en la posición de la región? Mejor no complicar.
                        // Mostramos un tooltip en el centro de la región? Podemos ponerlo en la parte inferior.
                        // Para simplificar, mostramos un tooltip en la esquina.
                        const rect = item.getBoundingClientRect();
                        const mapRect = document.querySelector('.map-wrapper').getBoundingClientRect();
                        const x = rect.left - mapRect.left + rect.width / 2;
                        const y = rect.top - mapRect.top - 10;
                        tooltip.style('opacity', 1)
                            .style('left', x + 'px')
                            .style('top', y + 'px')
                            .html(`
                                <div class="region">${r.label}</div>
                                <div><span class="percent">${r.pct}%</span> de tu origen</div>
                            `);
                    });
                    item.addEventListener('mouseout', () => {
                        unhighlightRegion(r.id);
                        hideTooltip();
                    });
                    legendDiv.appendChild(item);
                });

                // ----- Funciones de resaltado -----
                function highlightRegion(id) {
                    // Resaltar la forma de la región
                    svg.selectAll('.region-shape')
                        .filter(d => d.id === id)
                        .classed('active', true);
                    // También atenuar las demás? No, solo resaltar esta.
                }

                function unhighlightRegion(id) {
                    svg.selectAll('.region-shape')
                        .filter(d => d.id === id)
                        .classed('active', false);
                }

                function showTooltip(event, label, pct) {
                    const [mx, my] = d3.pointer(event, container);
                    tooltip.style('opacity', 1)
                        .style('left', (mx + 16) + 'px')
                        .style('top', (my - 10) + 'px')
                        .html(`
                            <div class="region">${label}</div>
                            <div><span class="percent">${pct}%</span> de tu origen</div>
                        `);
                }

                function moveTooltip(event) {
                    const [mx, my] = d3.pointer(event, container);
                    tooltip.style('left', (mx + 16) + 'px')
                        .style('top', (my - 10) + 'px');
                }

                function hideTooltip() {
                    tooltip.style('opacity', 0);
                }

            }).catch(err => {
                console.error('Error cargando el mapa:', err);
                document.getElementById('map-container').innerHTML =
                    `<p style="color:#f0e6d0; padding:40px; text-align:center;">⚠️ No se pudo cargar el mapa. Verifica tu conexión a internet.</p>`;
            });
        })();
    </script>
</body>
</html>
