<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Estimación Étnica</title>
    <script src="https://d3js.org/d3.v7.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 850px;
            width: 100%;
            background: #16213e;
            border-radius: 32px;
            padding: 20px 20px 25px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        header {
            display: flex;
            justify-content: center;
            align-items: baseline;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        header h1 {
            color: #f0e6d0;
            font-weight: 400;
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            font-family: 'Georgia', serif;
            text-align: center;
        }
        .rotacion-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.12);
            color: #ffd966;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-left: 10px;
            border: 1px solid rgba(255, 215, 0, 0.15);
        }

        /* Leyenda superior */
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px 10px;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-height: 140px;
            overflow-y: auto;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #d0d8e0;
            font-size: 0.8rem;
            font-weight: 400;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 30px;
            transition: background 0.2s ease, transform 0.2s ease;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .legend-item:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            transform: scale(1.03);
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }
        .legend-label {
            display: flex;
            align-items: baseline;
            gap: 3px;
        }
        .legend-label .pct {
            font-weight: 600;
            color: #fff;
            font-size: 0.8rem;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            background: #0f1a2f;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            padding: 2px 0;
        }
        #map-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #map-container svg {
            display: block;
            width: 100%;
            height: auto;
            background: #0f1a2f;
            border-radius: 16px;
        }

        .country {
            stroke: #1a2a44;
            stroke-width: 0.5;
            fill: #2a3a5a;
            transition: none;
            vector-effect: non-scaling-stroke;
        }

        .region-shape {
            fill-opacity: 0.25;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 1.5;
            transition: fill-opacity 0.25s ease, stroke 0.25s ease, stroke-width 0.25s ease, filter 0.25s ease;
            cursor: pointer;
            vector-effect: non-scaling-stroke;
        }
        .region-shape.active {
            fill-opacity: 0.65;
            stroke: #ffd966;
            stroke-width: 3;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
        }

        #tooltip {
            position: absolute;
            background: rgba(10, 14, 30, 0.92);
            backdrop-filter: blur(8px);
            color: #f0e6d0;
            padding: 12px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            pointer-events: none;
            font-size: 1rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: opacity 0.25s ease;
            font-weight: 400;
            letter-spacing: 0.3px;
            max-width: 240px;
            line-height: 1.4;
            z-index: 10;
        }
        #tooltip .region {
            font-weight: 600;
            font-size: 1.2rem;
            color: #ffd966;
        }
        #tooltip .percent {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-left: 6px;
        }

        .page {
            display: none;
        }

        @media (max-width: 700px) {
            .container {
                padding: 12px;
            }
            header h1 {
                font-size: 1.3rem;
            }
            .legend {
                max-height: 100px;
                gap: 3px 6px;
                padding: 6px 8px;
                margin-bottom: 8px;
            }
            .legend-item {
                font-size: 0.7rem;
                padding: 2px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                Descubra la mezcla que lo hace único
                <span class="rotacion-badge">↻ rotado 90°</span>
            </h1>
        </header>

        <!-- Leyenda superior -->
        <div class="legend" id="legend"></div>

        <div class="map-wrapper">
            <div id="map-container"></div>
            <div id="tooltip">
                <div class="region">—</div>
                <div><span class="percent">0%</span> de tu origen</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- DATOS DE REGIONES ----------
            const regionData = [{
                id: 'italian_norte',
                label: 'Italian del norte',
                pct: 33.8,
                color: '#E54A4A',
                center: [10, 45],
                radius: 5
            }, {
                id: 'espanol_catalan_vasco',
                label: 'Español, catalán y vasco',
                pct: 9.0,
                color: '#E6A84A',
                center: [-4, 40],
                radius: 6
            }, {
                id: 'italian_sur',
                label: 'Italiano del sur',
                pct: 8.4,
                color: '#D94A8A',
                center: [15, 40],
                radius: 5
            }, {
                id: 'frances',
                label: 'Francés',
                pct: 6.5,
                color: '#4A8FE4',
                center: [2, 47],
                radius: 6
            }, {
                id: 'portugues',
                label: 'Portugués',
                pct: 2.2,
                color: '#6BBF6B',
                center: [-8, 39],
                radius: 5
            }, {
                id: 'sardo',
                label: 'Sardo',
                pct: 1.5,
                color: '#B37BCC',
                center: [9, 40],
                radius: 4
            }, {
                id: 'breton',
                label: 'Bretón',
                pct: 1.3,
                color: '#F2C94C',
                center: [-3, 48],
                radius: 4
            }, {
                id: 'ingles',
                label: 'Inglés',
                pct: 1.0,
                color: '#7F8C8D',
                center: [-2, 52],
                radius: 5
            }, {
                id: 'centroamerican_sur',
                label: 'Centroamerican del Sur',
                pct: 20.5,
                color: '#E67E22',
                center: [-75, 10],
                radius: 8
            }, {
                id: 'peruano_boliviano',
                label: 'Peruano y boliviano',
                pct: 6.8,
                color: '#1ABC9C',
                center: [-70, -15],
                radius: 6
            }, {
                id: 'mexicano',
                label: 'Mexicano',
                pct: 5.3,
                color: '#F39C12',
                center: [-102, 23],
                radius: 7
            }, {
                id: 'centroamerican_norte',
                label: 'Centroamerican del Norte',
                pct: 2.4,
                color: '#3498DB',
                center: [-90, 15],
                radius: 5
            }, {
                id: 'africa',
                label: 'África',
                pct: 1.3,
                color: '#2ECC71',
                center: [10, 20],
                radius: 12
            }];

            // Ordenar por porcentaje descendente
            regionData.sort((a, b) => b.pct - a.pct);

            // ---------- DIMENSIONES (más cuadrado) ----------
            const width = 700;
            const height = 700;
            const container = document.getElementById('map-container');
            const svg = d3.select('#map-container')
                .append('svg')
                .attr('viewBox', `0 0 ${width} ${height}`)
                .style('width', '100%')
                .style('height', 'auto');

            // ClipPath para ocultar polos (recorte mínimo)
            const clipId = 'clip-polares';
            svg.append('defs')
                .append('clipPath')
                .attr('id', clipId)
                .append('rect')
                .attr('x', 0)
                .attr('y', 30) // margen superior reducido
                .attr('width', width)
                .attr('height', height - 60); // margen inferior reducido

            const mainGroup = svg.append('g')
                .attr('clip-path', `url(#${clipId})`);

            const tooltip = d3.select('#tooltip');

            // ---------- CARGA DE MAPA ----------
            const url = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json';

            d3.json(url).then(data => {
                const countries = topojson.feature(data, data.objects.countries);

                // Proyección con zoom para ocupar casi todo el espacio
                const projection = d3.geoMercator()
                    .fitExtent([
                        [20, 20],
                        [width - 20, height - 20]
                    ], countries);
                const path = d3.geoPath().projection(projection);

                // ----- Países (fondo) -----
                mainGroup.selectAll('.country')
                    .data(countries.features)
                    .enter()
                    .append('path')
                    .attr('class', 'country')
                    .attr('d', path)
                    .attr('fill', '#2a3a5a')
                    .attr('stroke', '#1a2a44')
                    .attr('stroke-width', 0.5);

                // ----- Regiones polimórficas -----
                const regionGroup = mainGroup.selectAll('.region-group')
                    .data(regionData)
                    .enter()
                    .append('g')
                    .attr('class', 'region-group');

                regionGroup.each(function(d) {
                    const group = d3.select(this);
                    const circleGen = d3.geoCircle()
                        .center(d.center)
                        .radius(d.radius);
                    const circleFeature = circleGen();

                    group.append('path')
                        .attr('class', 'region-shape')
                        .attr('d', path(circleFeature))
                        .attr('fill', d.color)
                        .attr('stroke', d.color)
                        .attr('stroke-width', 1.5)
                        .attr('data-region-id', d.id)
                        .on('mouseover', function(event) {
                            highlightRegion(d.id);
                            showTooltip(event, d.label, d.pct);
                        })
                        .on('mousemove', function(event) {
                            moveTooltip(event);
                        })
                        .on('mouseout', function() {
                            unhighlightRegion(d.id);
                            hideTooltip();
                        });
                });

                // ----- Leyenda interactiva (arriba) -----
                const legendDiv = document.getElementById('legend');
                legendDiv.innerHTML = '';
                regionData.forEach(r => {
                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    item.dataset.regionId = r.id;
                    item.innerHTML = `
                        <span class="legend-color" style="background:${r.color};"></span>
                        <span class="legend-label">
                            ${r.label}
                            <span class="pct">${r.pct}%</span>
                        </span>
                    `;
                    item.addEventListener('mouseover', () => {
                        highlightRegion(r.id);
                        // Mostrar tooltip cerca del elemento de la leyenda
                        const rect = item.getBoundingClientRect();
                        const mapRect = document.querySelector('.map-wrapper').getBoundingClientRect();
                        const x = rect.left - mapRect.left + rect.width / 2;
                        const y = rect.top - mapRect.top - 10;
                        tooltip.style('opacity', 1)
                            .style('left', x + 'px')
                            .style('top', y + 'px')
                            .html(`
                                <div class="region">${r.label}</div>
                                <div><span class="percent">${r.pct}%</span> de tu origen</div>
                            `);
                    });
                    item.addEventListener('mouseout', () => {
                        unhighlightRegion(r.id);
                        hideTooltip();
                    });
                    legendDiv.appendChild(item);
                });

                // ----- Funciones de resaltado -----
                function highlightRegion(id) {
                    mainGroup.selectAll('.region-shape')
                        .filter(d => d.id === id)
                        .classed('active', true);
                }

                function unhighlightRegion(id) {
                    mainGroup.selectAll('.region-shape')
                        .filter(d => d.id === id)
                        .classed('active', false);
                }

                function showTooltip(event, label, pct) {
                    const [mx, my] = d3.pointer(event, container);
                    tooltip.style('opacity', 1)
                        .style('left', (mx + 16) + 'px')
                        .style('top', (my - 10) + 'px')
                        .html(`
                            <div class="region">${label}</div>
                            <div><span class="percent">${pct}%</span> de tu origen</div>
                        `);
                }

                function moveTooltip(event) {
                    const [mx, my] = d3.pointer(event, container);
                    tooltip.style('left', (mx + 16) + 'px')
                        .style('top', (my - 10) + 'px');
                }

                function hideTooltip() {
                    tooltip.style('opacity', 0);
                }

            }).catch(err => {
                console.error('Error cargando el mapa:', err);
                document.getElementById('map-container').innerHTML =
                    `<p style="color:#f0e6d0; padding:40px; text-align:center;">⚠️ No se pudo cargar el mapa. Verifica tu conexión a internet.</p>`;
            });
        })();
    </script>
</body>
</html>
