<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - Registro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        #btn-enviar { 
            background: #007bff; color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 8px; cursor: pointer; font-size: 1rem; 
            font-weight: bold; transition: 0.3s; 
        }
        #btn-enviar:disabled { background: #6c757d; cursor: not-allowed; }
        
        #file-names { margin-top: 10px; font-size: 0.85rem; color: #666; background: #f8f9fa; padding: 10px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Registrar Problema</h2>
    
    <form action="https://forminit.com/f/jmpr012pl5x" method="POST" enctype="multipart/form-data" id="form-soporte">
        
        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" name="nombre" required>
        </div>

        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" name="email" id="user_email" required>
        </div>

        <div class="form-group">
            <label>Descripción del Problema</label>
            <textarea name="mensaje" rows="4" required placeholder="Describe el error aquí..."></textarea>
        </div>

        <div class="form-group">
            <label>Adjuntar Archivos (Fotos o Documentos)</label>
            <input type="file" name="archivo_adjunto" id="file_picker" multiple required>
            <div id="file-names"></div>
        </div>

        <button type="submit" id="btn-enviar">Enviar al Soporte</button>
    </form>
</div>

<script>
    const form = document.getElementById('form-soporte');
    const btn = document.getElementById('btn-enviar');
    const filePicker = document.getElementById('file_picker');
    const emailInput = document.getElementById('user_email');
    const fileNamesDiv = document.getElementById('file-names');

    // Generador de nombres dinámicos para los archivos
    filePicker.addEventListener('change', function() {
        const userPrefix = emailInput.value.split('@')[0] || "soporte";
        
        if (this.files.length > 0) {
            fileNamesDiv.style.display = 'block';
            fileNamesDiv.innerHTML = "<strong>Archivos detectados:</strong><br>";
            
            Array.from(this.files).forEach(file => {
                const ext = file.name.split('.').pop();
                const randomId = Math.floor(Math.random() * 9000) + 1000;
                fileNamesDiv.innerHTML += `📄 ${userPrefix}_${randomId}.${ext}<br>`;
            });
        }
    });

    // Efecto de carga solicitado
    form.addEventListener('submit', function() {
        btn.disabled = true;
        btn.innerText = "Enviando archivos... por favor espere";
    });
</script>

</body>
</html>
