<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - Registro de Archivos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #2c3e50; text-align: center; font-size: 1.6rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0056b3; }
        #file-list { margin-top: 10px; font-size: 0.85rem; color: #666; background: #f9f9f9; padding: 8px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Registrar Problema</h1>
    
    <form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">
        
        <input type="hidden" name="access_key" value="a20072ea-f205-4ead-a94c-58652c99f3f8">

        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" name="email" id="user_email" required>
        </div>

        <div class="form-group">
            <label>Descripción del Problema</label>
            <textarea name="message" rows="4" required></textarea>
        </div>

        <div class="form-group">
            <label>Adjuntar Archivos (ZIP, RAR, PDF, Imagen)</label>
            <input type="file" name="attachment" id="file_picker" accept=".zip,.rar,.pdf,image/*" multiple required>
            <div id="file-list"></div>
        </div>
        
        <input type="hidden" name="redirect" value="https://web3forms.com/success">

        <button type="submit">Enviar Reporte</button>
    </form>
</div>

<script>
    const filePicker = document.getElementById('file_picker');
    const emailInput = document.getElementById('user_email');
    const fileList = document.getElementById('file-list');

    filePicker.addEventListener('change', function() {
        const user = emailInput.value.split('@')[0] || "usuario";
        
        if (this.files.length > 0) {
            fileList.style.display = 'block';
            fileList.innerHTML = "<strong>Nombres de referencia:</strong><br>";
            
            Array.from(this.files).forEach(f => {
                const ext = f.name.split('.').pop();
                const rand = Math.floor(Math.random() * 9000) + 1000;
                fileList.innerHTML += `📎 ${user}_${rand}.${ext}<br>`;
            });
        }
    });
</script>

</body>
</html>
