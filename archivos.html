<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - Registro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        h1 { font-size: 1.5rem; color: #1a2a3a; margin: 0; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 7px; font-weight: 600; color: #444; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #file-info { margin-top: 10px; font-size: 0.85rem; color: #666; background: #f8f9fa; padding: 10px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <header>
        <h1>Registrar Problema</h1>
    </header>

    <form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">
        
        <input type="hidden" name="access_key" value="nmijskfhyyc">

        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" name="nombre" required>
        </div>

        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" name="email" id="user_email" required>
        </div>

        <div class="form-group">
            <label>Descripción del Problema</label>
            <textarea name="mensaje" rows="4" required></textarea>
        </div>

        <div class="form-group">
            <label>Adjuntos (ZIP, RAR, PDF, Imagen)</label>
            <input type="file" name="attachment" id="file_picker" accept=".zip,.rar,.pdf,image/*" multiple required>
            <div id="file-info"></div>
        </div>
        
        <input type="hidden" name="redirect" value="https://web3forms.com/success">

        <button type="submit">Enviar Reporte Ahora</button>
    </form>
</div>

<script>
    const filePicker = document.getElementById('file_picker');
    const emailInput = document.getElementById('user_email');
    const fileInfo = document.getElementById('file-info');

    filePicker.addEventListener('change', function() {
        const user = emailInput.value.split('@')[0] || "usuario";
        
        if (this.files.length > 0) {
            fileInfo.style.display = 'block';
            fileInfo.innerHTML = "<strong>Archivos detectados:</strong><br>";
            
            Array.from(this.files).forEach(f => {
                const ext = f.name.split('.').pop();
                const rand = Math.floor(Math.random() * 9000) + 1000;
                // Formato solicitado: email_numero.extension
                fileInfo.innerHTML += `📎 ${user}_${rand}.${ext}<br>`;
            });
        }
    });
</script>

</body>
</html>
