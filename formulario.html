<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Soporte Técnico - Pablo Uruena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.11.0/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h1 { color: #0061ff; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0061ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #msg { margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Centro de Soporte</h1>
    <form id="formSoporte">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="mensaje" rows="4" placeholder="Describe el problema..." required></textarea>
        <label style="display:block; margin-bottom:10px; font-weight:bold;">Adjuntar archivo:</label>
        <input type="file" id="archivo" required>
        <button type="submit" id="btnSoporte">Enviar Reporte</button>
        <div id="msg"></div>
    </form>
</div>

<script>
    const CID = '1wpdtwlh7fg0lxb';
    const CSC = 'ktf6yj0krxhelbm';
    const RTK = 'XxYtrHwvNW4AAAAAAAAAAAfSNITwuzondoZZqJ fZWgx8yrJ9vSTlqJFBVtmhcv iXU'.replace(/\s/g, '');

    async function renovar() {
        const r = await fetch('https://api.dropbox.com/oauth2/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ 
                'grant_type': 'refresh_token', 
                'refresh_token': RTK, 
                'client_id': CID, 
                'client_secret': CSC 
            })
        });
        const d = await r.json();
        if (d.error) throw new Error(d.error_description);
        return d.access_token;
    }

    document.getElementById('formSoporte').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSoporte');
        const m = document.getElementById('msg');
        btn.disabled = true;
        m.style.display = "block"; 
        m.style.backgroundColor = "#e8f0fe";
        m.innerText = "⏳ Enviando reporte...";
        
        try {
            const tk = await renovar();
            const dbx = new Dropbox.Dropbox({ accessToken: tk });
            const file = document.getElementById('archivo').files[0];
            
            await dbx.filesUpload({ 
                path: '/Soporte_' + Date.now() + '_' + file.name, 
                contents: file 
            });

            m.innerText = "✅ Reporte enviado con éxito";
            m.style.backgroundColor = "#d4edda";
            m.style.color = "#155724";
            this.reset();
        } catch (err) {
            m.innerText = "❌ Error: " + err.message;
            m.style.backgroundColor = "#f8d7da";
            m.style.color = "#721c24";
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
