<!DOCTYPE html>

    <title>Soporte Técnico - Dropbox Direct Corregiido</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.11.0/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #0061ff; margin-top: 0; margin-bottom: 10px; }
        p { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 7px; font-weight: bold; color: #333; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        textarea { resize: none; }
        button { background-color: #0061ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #0046b8; }
        button:disabled { background-color: #a0c4ff; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; font-weight: 600; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Centro de Reportes</h2>
    <p>Tus archivos se guardarán directamente en Dropbox.</p>

    <form id="dropbox-form">
        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" id="nombre" required placeholder="Juan Pérez">
        </div>

        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" required placeholder="usuario@ejemplo.com">
        </div>

        <div class="form-group">
            <label>Descripción del Error</label>
            <textarea id="mensaje" rows="4" required placeholder="Explica brevemente qué sucede..."></textarea>
        </div>

        <div class="form-group">
            <label>Adjuntar Archivo (ZIP, Imagen, etc.)</label>
            <input type="file" id="archivo" required>
        </div>

        <button type="submit" id="btn-enviar">Enviar a mi Dropbox</button>
    </form>
    <div id="status"></div>
</div>

    const dbx = new Dropbox.Dropbox({ accessToken: TOKEN });

    document.getElementById('dropbox-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar');
        const status = document.getElementById('status');
        
        const nombre = document.getElementById('nombre').value;
        const email = document.getElementById('email').value;
        const mensaje = document.getElementById('mensaje').value;
        const archivo = document.getElementById('archivo').files[0];

        btn.disabled = true;
        status.innerText = "⏳ Subiendo reporte a Dropbox...";

        try {
            // 1. Crear el nombre del archivo basado en el email

            status.style.backgroundColor = "#d4edda";
            status.style.color = "#155724";

        } catch (error) {
            console.error(error);

            status.style.backgroundColor = "#f8d7da";
            status.style.color = "#721c24";
        } finally {
            btn.disabled = false;
        }
