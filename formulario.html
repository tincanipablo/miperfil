<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - Dropbox Direct</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.11.0/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #0061ff; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #0061ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #0046b8; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Enviar Reporte</h2>
    <form id="dropbox-form">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" required placeholder="Tu nombre">
        </div>
        <div class="form-group">
            <label>Email (será el nombre del archivo)</label>
            <input type="email" id="email" required placeholder="ejemplo@correo.com">
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea id="mensaje" rows="4" required placeholder="Describe el problema..."></textarea>
        </div>
        <div class="form-group">
            <label>Adjuntar archivo (ZIP, Imagen, etc.)</label>
            <input type="file" id="archivo" required>
        </div>
        <button type="submit" id="btn-enviar">Subir a Dropbox</button>
    </form>
    <div id="status"></div>
</div>

    const dbx = new Dropbox.Dropbox({ accessToken: ACCESS_TOKEN });

    document.getElementById('dropbox-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar');
        const status = document.getElementById('status');
        
        const nombre = document.getElementById('nombre').value;
        const email = document.getElementById('email').value;
        const mensaje = document.getElementById('mensaje').value;
        const archivo = document.getElementById('archivo').files[0];

        btn.disabled = true;
        status.innerText = "⏳ Subiendo reporte...";
        status.style.color = "#555";

        try {
            // 1. Crear el archivo de texto con la información
            const contenidoTexto = `REPORTE DE SOPORTE\n------------------\nNombre: ${nombre}\nEmail: ${email}\nMensaje: ${mensaje}\nFecha: ${new Date().toLocaleString()}`;
            
            // Ruta del archivo TXT (ej: /juan@gmail.com.txt)
            const rutaTxt = '/' + email + '.txt';
            
            await dbx.filesUpload({ path: rutaTxt, contents: contenidoTexto, mode: 'overwrite' });

            // 2. Subir el archivo adjunto (ej: /juan@gmail.com_captura.png)
            const rutaArchivo = '/' + email + '_' + archivo.name;
            
            await dbx.filesUpload({ path: rutaArchivo, contents: archivo, mode: 'overwrite' });

            status.innerText = "✅ ¡Reporte enviado con éxito!";
            status.style.color = "green";
            document.getElementById('dropbox-form').reset();
        } catch (error) {
            console.error(error);
            status.innerText = "❌ Error al subir. Revisa los permisos.";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    });
