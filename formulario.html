<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - Registro Directo Drop Box</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.11.0/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .contenedor { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #0061ff; margin-bottom: 25px; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { background-color: #0061ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #004dc2; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        #estado { margin-top: 20px; text-align: center; font-size: 14px; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Enviar Reporte</h2>
    <form id="form-dropbox">
        <div class="campo">
            <label>Nombre</label>
            <input type="text" id="nom" required placeholder="Tu nombre">
        </div>
        <div class="campo">
            <label>Email</label>
            <input type="email" id="correo" required placeholder="ejemplo@correo.com">
        </div>
        <div class="campo">
            <label>Descripción</label>
            <textarea id="desc" rows="4" required placeholder="¿Qué necesitas ayuda?"></textarea>
        </div>
        <div class="campo">
            <label>Adjuntar archivo</label>
            <input type="file" id="adjunto" required>
        </div>
        <button type="submit" id="btn-envio">Enviar a Dropbox</button>
    </form>
    <div id="estado"></div>
</div>

    const dbx = new Dropbox.Dropbox({ accessToken: TOKEN_DBX });

    document.getElementById('form-dropbox').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-envio');
        const estado = document.getElementById('estado');
        
        const nombre = document.getElementById('nom').value;
        const email = document.getElementById('correo').value;
        const mensaje = document.getElementById('desc').value;
        const archivo = document.getElementById('adjunto').files[0];

        btn.disabled = true;
        estado.style.display = "block";
        estado.innerText = "⏳ Subiendo reporte a tu Dropbox...";
        estado.style.backgroundColor = "#e1f5fe";
        estado.style.color = "#01579b";

        try {
            // Limpiar el email para usarlo como nombre de archivo
            const idUsuario = email.replace(/[^a-z0-9]/gi, '_');

            // 1. Crear el TXT con los datos del formulario
            const contenidoTexto = `NUEVO REPORTE\n-------------\nNombre: ${nombre}\nEmail: ${email}\nMensaje: ${mensaje}\nFecha: ${new Date().toLocaleString()}`;
            await dbx.filesUpload({ path: '/' + idUsuario + '.txt', contents: contenidoTexto, mode: 'overwrite' });

            // 2. Subir el archivo adjunto original
            await dbx.filesUpload({ path: '/' + idUsuario + '_' + archivo.name, contents: archivo, mode: 'overwrite' });

            estado.innerText = "✅ ¡Enviado! Revisa tu carpeta de Dropbox.";
            estado.style.backgroundColor = "#e8f5e9";
            estado.style.color = "#2e7d32";
            document.getElementById('form-dropbox').reset();
        } catch (err) {
            console.error(err);
            estado.innerText = "❌ Error al subir. Verifica los permisos de la App.";
            estado.style.backgroundColor = "#ffebee";
            estado.style.color = "#c62828";
        } finally {
            btn.disabled = false;
        }
    });
