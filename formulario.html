<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - PersonalWebTincani</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.11.0/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #0061ff; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #0061ff; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Centro de Soporte</h2>
    <form id="form-soporte">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <textarea id="mensaje" rows="4" placeholder="Describe el problema..." required></textarea>
        <label style="font-size: 13px; color: #666;">Adjuntar captura/archivo:</label>
        <input type="file" id="archivo" required>
        <button type="submit" id="btn-enviar">Enviar Reporte</button>
    </form>
    <div id="status"></div>
</div>

<script>
    // DATOS DE TUS CAPTURAS
    const CLIENT_ID = '1wpdtwlh7fg0lxb';
    const CLIENT_SECRET = 'ktf6yj0krxhelbm';
    // Este token "maestro" permite renovar el acceso automáticamente
    const REFRESH_TOKEN = 'L0D9u_YV-PAAAAAAAAAAAbn_B_WjWREp6m7C9rG0O-Kx7K_Y2tS1-wM0k2-LhPzB';

    async function obtenerTokenNuevo() {
        const response = await fetch('https://api.dropbox.com/oauth2/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                'grant_type': 'refresh_token',
                'refresh_token': REFRESH_TOKEN,
                'client_id': CLIENT_ID,
                'client_secret': CLIENT_SECRET
            })
        });
        const data = await response.json();
        if (data.error) throw new Error("Error al renovar token");
        return data.access_token;
    }

    document.getElementById('form-soporte').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.style.display = "block";
        status.innerText = "⏳ Conectando con Dropbox...";
        status.style.backgroundColor = "#fff3cd";

        try {
            // 1. Renovamos el token antes de subir nada
            const tokenVivo = await obtenerTokenNuevo();
            const dbx = new Dropbox.Dropbox({ accessToken: tokenVivo });

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const mensaje = document.getElementById('mensaje').value;
            const file = document.getElementById('archivo').files[0];
            const carpeta = email.replace(/[^a-z0-9]/gi, '_');

            // 2. Subimos los datos
            const contenidoTexto = `Nombre: ${nombre}\nEmail: ${email}\nMensaje: ${mensaje}`;
            await dbx.filesUpload({ path: `/${carpeta}.txt`, contents: contenidoTexto, mode: 'overwrite' });
            await dbx.filesUpload({ path: `/${carpeta}_${file.name}`, contents: file, mode: 'overwrite' });

            status.innerText = "✅ ¡Enviado correctamente!";
            status.style.backgroundColor = "#d4edda";
            document.getElementById('form-soporte').reset();
        } catch (error) {
            console.error(error);
            status.innerText = "❌ Error en el servidor. Inténtalo más tarde.";
            status.style.backgroundColor = "#f8d7da";
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
