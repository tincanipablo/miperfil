<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico - Conexión Permanente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.11.0/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #0061ff; margin-top: 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #0061ff; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Centro de Soporte</h2>
    <form id="main-form">
        <label>Nombre</label>
        <input type="text" id="u_name" required>
        
        <label>Email</label>
        <input type="email" id="u_email" required>
        
        <label>Mensaje</label>
        <textarea id="u_msg" rows="3" required></textarea>
        
        <label>Adjuntar Archivo</label>
        <input type="file" id="u_file" required>
        
        <button type="submit" id="u_btn">Enviar Reporte</button>
    </form>
    <div id="status"></div>
</div>

<script>
    // Configuración de tu App de Dropbox
    const CLIENT_ID = '1wpdtwlh7fg0lxb';
    const CLIENT_SECRET = 'ktf6yj0krxhelbm';
    // Este token se encarga de renovar el acceso automáticamente
    const REFRESH_TOKEN = 'PXxfOvEInRsAAAAAAAAAFqrxYXu9zyyqxgfoVCEvpUjY'; 

    async function getFreshAccessToken() {
        const params = new URLSearchParams({
            'grant_type': 'refresh_token',
            'refresh_token': REFRESH_TOKEN,
            'client_id': CLIENT_ID,
            'client_secret': CLIENT_SECRET
        });

        const response = await fetch('https://api.dropbox.com/oauth2/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        });
        const data = await response.json();
        return data.access_token;
    }

    document.getElementById('main-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('u_btn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.style.display = "block";
        status.innerText = "⏳ Procesando envío seguro...";
        status.style.backgroundColor = "#fff3cd";

        try {
            // 1. Obtener un token nuevo al momento
            const currentToken = await getFreshAccessToken();
            const dbx = new Dropbox.Dropbox({ accessToken: currentToken });

            const name = document.getElementById('u_name').value;
            const email = document.getElementById('u_email').value;
            const msg = document.getElementById('u_msg').value;
            const file = document.getElementById('u_file').files[0];
            const cleanEmail = email.replace(/[^a-z0-9]/gi, '_');

            // 2. Subir reporte TXT
            const reportBody = `REPORTE: ${name}\nEMAIL: ${email}\nMSJ: ${msg}\nFECHA: ${new Date().toLocaleString()}`;
            await dbx.filesUpload({ path: `/${cleanEmail}.txt`, contents: reportBody, mode: 'overwrite' });

            // 3. Subir archivo adjunto
            await dbx.filesUpload({ path: `/${cleanEmail}_${file.name}`, contents: file, mode: 'overwrite' });

            status.innerText = "✅ ¡Enviado! Ya está en tu Dropbox.";
            status.style.backgroundColor = "#d4edda";
            document.getElementById('main-form').reset();
        } catch (err) {
            console.error(err);
            status.innerText = "❌ Error en la subida.";
            status.style.backgroundColor = "#f8d7da";
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
