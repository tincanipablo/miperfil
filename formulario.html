    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.11.0/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #0061ff; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #e1e4e8; border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: border 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: #0061ff; }
        button { background-color: #0061ff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #004dc2; }
        button:disabled { background-color: #cbd5e0; cursor: not-allowed; }
        #status { margin-top: 20px; text-align: center; font-weight: bold; padding: 12px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Centro de Soporte</h2>
    <form id="dropbox-form">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="name" required placeholder="Tu nombre">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required placeholder="ejemplo@gmail.com">
        </div>
        <div class="form-group">
            <label>Mensaje</label>
            <textarea id="message" rows="4" required placeholder="Escribe tu consulta..."></textarea>
        </div>
        <div class="form-group">
            <label>Adjuntar Archivo</label>
            <input type="file" id="file" required>
        </div>
        <button type="submit" id="submit-btn">Enviar Reporte</button>
    </form>
    <div id="status"></div>
</div>

    const dbx = new Dropbox.Dropbox({ accessToken: ACCESS_TOKEN });

    document.getElementById('dropbox-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.style.display = "block";
        status.innerText = "⏳ Subiendo reporte...";
        status.style.backgroundColor = "#e1f5fe";
        status.style.color = "#01579b";

        try {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const file = document.getElementById('file').files[0];
            const cleanEmail = email.replace(/[^a-z0-9]/gi, '_');

            // 1. Subir archivo de texto con el detalle del mensaje
            const textContent = `Nombre: ${name}\nEmail: ${email}\nMensaje: ${message}\nFecha: ${new Date().toLocaleString()}`;

            status.innerText = "✅ ¡Enviado correctamente!";
            status.style.backgroundColor = "#e8f5e9";
            status.style.color = "#2e7d32";
            document.getElementById('dropbox-form').reset();
        } catch (err) {
            console.error(err);
            status.innerText = "❌ Error en la subida. Verifica el token.";
            status.style.backgroundColor = "#ffebee";
            status.style.color = "#c62828";
        } finally {
            btn.disabled = false;
        }
    });
