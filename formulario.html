<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Soporte - Pablo Uruena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.11.0/Dropbox-sdk.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #0061ff; text-align: center; margin-bottom: 25px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0061ff; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0054de; }
        #msg { margin-top: 15px; padding: 10px; border-radius: 5px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Centro de Soporte</h1>
    <form id="formSoporte">
        <div class="field">
            <label>Nombre:</label>
            <input type="text" id="nombre" required>
        </div>
        <div class="field">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>
        <div class="field">
            <label>Mensaje:</label>
            <textarea id="mensaje" rows="4" required></textarea>
        </div>
        <div class="field">
            <label>Adjuntar Archivo:</label>
            <input type="file" id="archivo" required>
        </div>
        <button type="submit" id="btnSoporte">Enviar Reporte</button>
        <div id="msg"></div>
    </form>
</div>

<script>
    const CLIENT_ID = '1wpdtwlh7fg0lxb';
    const CLIENT_SECRET = 'ktf6yj0krxhelbm';
    const REFRESH_TOKEN = 'XxYtrHwvNW4AAAAAAAAAAAfSNITwuzondoZZqJ fZWgx8yrJ9vSTlqJFBVtmhcv iXU'.replace(/\s/g, '');

    async function renovarToken() {
        const response = await fetch('https://api.dropbox.com/oauth2/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                'grant_type': 'refresh_token',
                'refresh_token': REFRESH_TOKEN,
                'client_id': CLIENT_ID,
                'client_secret': CLIENT_SECRET
            })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error_description);
        return data.access_token;
    }

    document.getElementById('formSoporte').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSoporte');
        const msg = document.getElementById('msg');

        btn.disabled = true;
        msg.style.display = "block";
        msg.style.backgroundColor = "#e7f3ff";
        msg.innerText = "Subiendo reporte...";

        try {
            const token = await renovarToken();
            const dbx = new Dropbox.Dropbox({ accessToken: token });

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const texto = document.getElementById('mensaje').value;
            const file = document.getElementById('archivo').files[0];

            const contenido = `Nombre: ${nombre}\nEmail: ${email}\nMensaje: ${texto}`;
            const timestamp = Date.now();

            await dbx.filesUpload({ path: `/Soporte_${timestamp}_info.txt`, contents: contenido });
            await dbx.filesUpload({ path: `/Soporte_${timestamp}_${file.name}`, contents: file });

            msg.innerText = "✅ Reporte enviado correctamente.";
            msg.style.backgroundColor = "#d4edda";
            this.reset();
        } catch (err) {
            msg.innerText = "❌ Error en la subida.";
            msg.style.backgroundColor = "#f8d7da";
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
